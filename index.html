<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYTELOG | Herramientas Multimedia Gratuitas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f9; --card-bg: #ffffff; --text-main: #1a1a1a;
            --text-muted: #666666; --accent: #cc2200; --border: #e5e5e5;
        }
        body.dark {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text-main: #f0f0f0;
            --text-muted: #a0a0a0; --border: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); transition: 0.3s; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 22px; cursor: pointer; }
        .logo span { color: var(--accent); }
        
        .hero { text-align: center; padding: 50px 0; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .tool-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        
        #workspace { display: none; padding: 40px 0; text-align: center; }
        .drop-zone { border: 2px dashed var(--border); border-radius: 15px; padding: 50px; background: var(--card-bg); margin: 20px 0; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        
        #preview { max-width: 300px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid var(--border); }
        #status { margin-top: 20px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="container nav-inner">
        <div class="logo" onclick="location.reload()">BYTE<span>LOG</span></div>
        <button onclick="document.body.classList.toggle('dark')" style="background:none; border:none; cursor:pointer; font-size:18px;">🌙</button>
    </div>
</header>

<main class="container">
    <div id="home-view">
        <section class="hero">
            <h1>Herramientas Multimedia Locales</h1>
            <p>Procesamiento rápido y privado directamente en tu navegador.</p>
        </section>
        <div class="tools-grid">
            <div class="tool-card" onclick="startTool('webp')"><h3>🖼️ Comprimir WebP</h3><p>Optimiza imágenes para web.</p></div>
            <div class="tool-card" onclick="startTool('sticker')"><h3>✨ Sticker WhatsApp</h3><p>Crea stickers de 512x512.</p></div>
        </div>
    </div>

    <div id="workspace">
        <button class="btn-main" style="background:#666" onclick="location.reload()">← Volver</button>
        <h2 id="tool-title" style="margin: 20px 0;">Herramienta</h2>
        <div class="drop-zone">
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            <button class="btn-main" onclick="document.getElementById('fileInput').click()">Seleccionar Imagen</button>
            <br>
            <img id="preview" src="#">
        </div>
        <div id="status"></div>
        <a id="download-link" style="display:none" class="btn-main">Descargar Resultado</a>
    </div>
</main>

<script>
    let currentMode = '';
    const fileInput = document.getElementById('fileInput');
    const downloadLink = document.getElementById('download-link');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    function startTool(mode) {
        currentMode = mode;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('workspace').style.display = 'block';
        document.getElementById('tool-title').innerText = mode === 'webp' ? 'Compresor WebP' : 'Sticker para WhatsApp';
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Cargando imagen...";
        const reader = new FileReader();
        
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Mostrar vista previa
                preview.src = event.target.result;
                preview.style.display = "inline-block";
                
                // Procesar
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                if (currentMode === 'sticker') {
                    canvas.width = 512; canvas.height = 512;
                    ctx.drawImage(img, 0, 0, 512, 512); [cite: 150, 173]
                } else {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); [cite: 177]
                }

                const quality = currentMode === 'webp' ? 0.6 : 0.9;
                const resultData = canvas.toDataURL('image/webp', quality); [cite: 134, 173]

                downloadLink.href = resultData;
                downloadLink.download = `bytelog_${currentMode}.webp`;
                downloadLink.style.display = "inline-block";
                status.innerText = "¡Proceso completado!";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
