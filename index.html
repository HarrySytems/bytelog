<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLog Tools | Generador Seguro & Nicks</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.75);
            --em: #10b981;
            --cyan: #22d3ee;
        }
        
        /* ==========================================
           PUNTERO PERSONALIZADO: MANDO GAMER (SVG)
           ========================================== */
        body, html {
            background-color: var(--bg);
            color: #e6edf3;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" width="28" height="28" fill="%2322d3ee" stroke="white" stroke-width="15"><path d="M192 64C86 64 0 150 0 256S86 448 192 448H448c106 0 192-86 192-192s-86-192-192-192H192zM144 192h32v32h32v32H176v32H144V256H112V224h32V192zm272 96a32 32 0 1 1 0-64 32 32 0 1 1 0 64zm64-64a32 32 0 1 1 0-64 32 32 0 1 1 0 64z"/></svg>') 14 14, auto;
        }

        button, a, input[type="range"], label.cursor-pointer, .spoiler-container, select, input[type="text"], .custom-x-scrollbar::-webkit-scrollbar-thumb {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" width="28" height="28" fill="%2310b981" stroke="white" stroke-width="15"><path d="M192 64C86 64 0 150 0 256S86 448 192 448H448c106 0 192-86 192-192s-86-192-192-192H192zM144 192h32v32h32v32H176v32H144V256H112V224h32V192zm272 96a32 32 0 1 1 0-64 32 32 0 1 1 0 64zm64-64a32 32 0 1 1 0-64 32 32 0 1 1 0 64z"/></svg>') 14 14, pointer !important;
        }

        .mouse-particle {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            width: 8px; height: 8px;
            background-color: var(--cyan);
            border-radius: 2px;
            box-shadow: 0 0 6px currentColor;
            animation: fall 0.8s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(30px) scale(0) rotate(90deg); opacity: 0; }
        }

        #soupCanvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; opacity: 0.6;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
        }

        .spoiler-container { position: relative; border-radius: 0.75rem; overflow: hidden; }
        .spoiler-content {
            filter: blur(10px); opacity: 0.4;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none; word-break: break-all;
        }
        .spoiler-overlay {
            position: absolute; inset: 0; background: rgba(31, 41, 55, 0.8);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.3s ease; z-index: 2;
        }
        .spoiler-overlay::after {
            content: '👀 Revelar Contraseña'; font-size: 0.85rem; font-weight: 700;
            color: #d1d5db; background: rgba(0,0,0,0.6); padding: 6px 12px;
            border-radius: 6px; letter-spacing: 0.5px;
        }
        .spoiler-container.revealed .spoiler-content { filter: blur(0); opacity: 1; user-select: text; }
        .spoiler-container.revealed .spoiler-overlay { opacity: 0; pointer-events: none; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        .custom-x-scrollbar { overscroll-behavior-x: contain; }
        .custom-x-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-x-scrollbar::-webkit-scrollbar-track { background: rgba(17, 24, 39, 0.5); border-radius: 8px; }
        .custom-x-scrollbar::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 8px; }
        .custom-x-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--em); }
        
        .nick-list-container { overscroll-behavior: contain; }
        
        .unicode-text { font-family: "Segoe UI Symbol", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Arial Unicode MS", sans-serif; }

        input[type=range] { accent-color: var(--em); }
        @keyframes popIn {
            0% { transform: scale(0.95) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="relative pb-10">

    <main class="relative z-10 max-w-4xl mx-auto px-4 py-8">
        
        <!-- PESTAÑAS -->

        <!-- GENERADOR DE CONTRASEÑAS -->

    <script>
        // ==========================================
        // EFECTO DE PARTÍCULAS DEL RATÓN (8-Bit Pixels)
        // ==========================================
        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.15) return; 
            const particle = document.createElement('div');
            particle.className = 'mouse-particle';
            particle.style.left = (e.pageX - 4) + 'px';
            particle.style.top = (e.pageY - 4) + 'px';
            particle.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`; 
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 800);
        });

        // ==========================================
        // SISTEMA DE NAVEGACIÓN (PESTAÑAS)
        // ==========================================
        const tabPass = document.getElementById('tabPass');
        const tabNick = document.getElementById('tabNick');
        const sectionPass = document.getElementById('sectionPass');
        const sectionNick = document.getElementById('sectionNick');

        function switchTab(tab) {
            sectionPass.classList.remove('animate-pop');
            sectionNick.classList.remove('animate-pop');

            if (tab === 'pass') {
                sectionPass.classList.remove('hidden'); sectionPass.classList.add('block');
                sectionNick.classList.add('hidden'); sectionNick.classList.remove('flex');
                void sectionPass.offsetWidth; sectionPass.classList.add('animate-pop');
                tabPass.className = "px-5 sm:px-8 py-3 rounded-full font-bold transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-500/30 text-sm sm:text-base flex items-center gap-2";
                tabNick.className = "px-5 sm:px-8 py-3 rounded-full font-bold transition-all bg-gray-800/80 text-gray-400 hover:text-white hover:bg-gray-700 border border-gray-700 text-sm sm:text-base flex items-center gap-2";
            } else {
                sectionPass.classList.add('hidden'); sectionPass.classList.remove('block');
                sectionNick.classList.remove('hidden'); sectionNick.classList.add('flex');
                void sectionNick.offsetWidth; sectionNick.classList.add('animate-pop');
                tabNick.className = "px-5 sm:px-8 py-3 rounded-full font-bold transition-all bg-cyan-600 text-white shadow-lg shadow-cyan-500/30 text-sm sm:text-base flex items-center gap-2";
                tabPass.className = "px-5 sm:px-8 py-3 rounded-full font-bold transition-all bg-gray-800/80 text-gray-400 hover:text-white hover:bg-gray-700 border border-gray-700 text-sm sm:text-base flex items-center gap-2";
            }
        }
        tabPass.addEventListener('click', () => switchTab('pass'));
        tabNick.addEventListener('click', () => switchTab('nick'));

        // ==========================================
        // 1. SISTEMA "SOPA DE CARACTERES" (CANVAS GPU)
        // ==========================================
        const canvas = document.getElementById('soupCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+{}[]|;:,.<>?/アイウエオカキクケコサシスセソ🚀👾🔥💎🛡️🔒💻⚡💀👁️‍🗨️";
        const charArray = Array.from(chars); 

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            const particleCount = window.innerWidth < 768 ? 70 : 150;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    char: charArray[Math.floor(Math.random() * charArray.length)],
                    size: Math.random() * 22 + 10, opacity: Math.random(),
                    fadeSpeed: (Math.random() * 0.015) + 0.005, fadeDir: Math.random() > 0.5 ? 1 : -1,
                    baseColor: `16, 185, 129`
                });
            }
        }

        function animateSoup() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.opacity += p.fadeSpeed * p.fadeDir;
                if (p.opacity >= 0.7) p.fadeDir = -1;
                if (p.opacity <= 0) {
                    p.fadeDir = 1; p.x = Math.random() * width; p.y = Math.random() * height;
                    p.char = charArray[Math.floor(Math.random() * charArray.length)];
                }
                ctx.font = `${p.size}px monospace`;
                if (/\p{Emoji}/u.test(p.char)) ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                else ctx.fillStyle = `rgba(${p.baseColor}, ${p.opacity})`;
                ctx.fillText(p.char, p.x, p.y);
            });
            requestAnimationFrame(animateSoup);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();
        animateSoup();

        // ==========================================
        // 2. GENERADOR DE CONTRASEÑAS (CRYPTO API)
        // ==========================================
        const passLength = document.getElementById('passLength');
        const lengthValue = document.getElementById('lengthValue');
        const chkUpper = document.getElementById('chkUpper');
        const chkLower = document.getElementById('chkLower');
        const chkNumbers = document.getElementById('chkNumbers');
        const chkSymbols = document.getElementById('chkSymbols');
        const chkEmojis = document.getElementById('chkEmojis');
        const btnGenPass = document.getElementById('btnGeneratePass');
        const btnCopyPass = document.getElementById('btnCopyPass');
        const btnResetPass = document.getElementById('btnResetPass');
        const passSpoiler = document.getElementById('passSpoiler');
        const passOutput = document.getElementById('passOutput');

        const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const LOWER = "abcdefghijklmnopqrstuvwxyz";
        const NUMS = "0123456789";
        const SYMS = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
        const EMOJIS = ["😀","🚀","🌟","🔥","👾","💡","💎","🛡️","🔑","🔒","⚡","👑","🐉","🧿","🌌","🕹️","🤖","🧩"];

        passLength.addEventListener('input', (e) => lengthValue.textContent = e.target.value);

        function getSecureRandomInt(max) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % max;
        }

        function generatePassword() {
            let charset = "";
            let useEmojis = chkEmojis.checked;
            let length = parseInt(passLength.value);
            
            if (chkUpper.checked) charset += UPPER;
            if (chkLower.checked) charset += LOWER;
            if (chkNumbers.checked) charset += NUMS;
            if (chkSymbols.checked) charset += SYMS;

            if (charset === "" && !useEmojis) { alert("Selecciona al menos un tipo de carácter."); return; }

            let password = "";
            let charArrayForPass = Array.from(charset);

            for (let i = 0; i < length; i++) {
                if (useEmojis && getSecureRandomInt(100) < 12) {
                    password += EMOJIS[getSecureRandomInt(EMOJIS.length)];
                } else if (charArrayForPass.length > 0) {
                    password += charArrayForPass[getSecureRandomInt(charArrayForPass.length)];
                } else {
                    password += EMOJIS[getSecureRandomInt(EMOJIS.length)];
                }
            }
            passOutput.textContent = password;
            passSpoiler.classList.remove('revealed');
            btnGenPass.classList.add('scale-95');
            setTimeout(() => btnGenPass.classList.remove('scale-95'), 150);
        }

        btnGenPass.addEventListener('click', generatePassword);
        passSpoiler.addEventListener('click', () => passSpoiler.classList.add('revealed'));
        btnResetPass.addEventListener('click', () => passSpoiler.classList.remove('revealed'));

        btnCopyPass.addEventListener('click', async () => {
            const text = passOutput.textContent;
            if (text === "••••••••••••••••") return;
            try {
                await navigator.clipboard.writeText(text);
                showCopiedFeedback(btnCopyPass);
            } catch (err) {
                const el = document.createElement('textarea'); el.value = text;
                document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                showCopiedFeedback(btnCopyPass);
            }
        });

        function showCopiedFeedback(btn) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check text-emerald-500"></i> ¡Copiado!';
            btn.classList.add('border-emerald-500', 'text-emerald-400');
            setTimeout(() => { btn.innerHTML = originalHTML; btn.classList.remove('border-emerald-500', 'text-emerald-400'); }, 2000);
        }

        // ==========================================
        // 3. GENERADOR DE NICKS ULTIMATE (NickForge)
        // Arquitectura Procedural Infinita (Cero Repeticiones)
        // ==========================================
        const nickInput = document.getElementById('nickInput');
        const btnGenNicks = document.getElementById('btnGenerateNicks');
        const nickList = document.getElementById('nickList');
        const nickEmpty = document.getElementById('nickEmpty');

        // MAPEOS EXACTOS DE FUENTES 
        const MAP_FRAKTUR = {'a':'𝖆','b':'𝖇','c':'𝖈','d':'𝖉','e':'𝖊','f':'𝖋','g':'𝖌','h':'𝖍','i':'𝖎','j':'𝖏','k':'𝖐','l':'𝖑','m':'𝖒','n':'𝖓','o':'𝖔','p':'𝖕','q':'𝖖','r':'𝖗','s':'𝖘','t':'𝖙','u':'𝖚','v':'𝖛','w':'𝖜','x':'𝖝','y':'𝖞','z':'𝖟','A':'𝕬','B':'𝕭','C':'𝕮','D':'𝕯','E':'𝕰','F':'𝕱','G':'𝕲','H':'𝕳','I':'𝕴','J':'𝕵','K':'𝕶','L':'𝕷','M':'𝕸','N':'𝕹','O':'𝕺','P':'𝕻','Q':'𝕼','R':'𝕽','S':'𝕾','T':'𝕿','U':'𝖀','V':'𝖁','W':'𝖂','X':'𝖃','Y':'𝖄','Z':'𝖅'};
        const MAP_FULLWIDTH = {'a':'ａ','b':'ｂ','c':'ｃ','d':'ｄ','e':'ｅ','f':'ｆ','g':'ｇ','h':'ｈ','i':'ｉ','j':'ｊ','k':'ｋ','l':'ｌ','m':'ｍ','n':'ｎ','o':'ｏ','p':'ｐ','q':'ｑ','r':'ｒ','s':'ｓ','t':'ｔ','u':'ｕ','v':'ｖ','w':'ｗ','x':'ｘ','y':'ｙ','z':'ｚ','A':'Ａ','B':'Ｂ','C':'Ｃ','D':'Ｄ','E':'Ｅ','F':'Ｆ','G':'Ｇ','H':'Ｈ','I':'Ｉ','J':'Ｊ','K':'Ｋ','L':'Ｌ','M':'Ｍ','N':'Ｎ','O':'Ｏ','P':'Ｐ','Q':'Ｑ','R':'Ｒ','S':'Ｓ','T':'Ｔ','U':'Ｕ','V':'Ｖ','W':'Ｗ','X':'Ｘ','Y':'Ｙ','Z':'Ｚ'};
        const MAP_SANS = {'a':'𝗮','b':'𝗯','c':'𝗰','d':'𝗱','e':'𝗲','f':'𝗳','g':'𝗴','h':'𝗵','i':'𝗶','j':'𝗷','k':'𝗸','l':'𝗹','m':'𝗺','n':'𝗻','o':'𝗼','p':'𝗽','q':'𝗾','r':'𝗿','s':'𝘀','t':'𝘁','u':'𝘂','v':'𝘃','w':'𝘄','x':'𝘅','y':'𝘆','z':'𝘇','A':'𝗔','B':'𝗕','C':'𝗖','D':'𝗗','E':'𝗘','F':'𝗙','G':'𝗚','H':'𝗛','I':'𝗜','J':'𝗝','K':'𝗞','L':'𝗟','M':'𝗠','N':'𝗡','O':'𝗢','P':'𝗣','Q':'𝗤','R':'𝗥','S':'𝗦','T':'𝗧','U':'𝗨','V':'𝗩','W':'𝗪','X':'𝗫','Y':'𝗬','Z':'𝗭'};
        const MAP_SCRIPT = {'a':'𝒶','b':'𝒷','c':'𝒸','d':'𝒹','e':'𝑒','f':'𝒻','g':'𝑔','h':'𝒽','i':'𝒾','j':'𝒿','k':'𝓀','l':'𝓁','m':'𝓂','n':'𝓃','o':'𝑜','p':'𝓅','q':'𝓆','r':'𝓇','s':'𝓈','t':'𝓉','u':'𝓊','v':'𝓋','w':'𝓌','x':'𝓍','y':'𝓎','z':'𝓏','A':'𝒜','B':'ℬ','C':'𝒞','D':'𝒟','E':'ℰ','F':'ℱ','G':'𝒢','H':'ℋ','I':'ℐ','J':'𝒥','K':'𝒦','L':'ℒ','M':'ℳ','N':'𝒩','O':'𝒪','P':'𝒫','Q':'𝒬','R':'ℛ','S':'𝒮','T':'𝒯','U':'𝒰','V':'𝒱','W':'𝒲','X':'𝒳','Y':'𝒴','Z':'𝒵'};
        const MAP_SMALLCAPS = {'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ғ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'s','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ','A':'A','B':'B','C':'C','D':'D','E':'E','F':'F','G':'G','H':'H','I':'I','J':'J','K':'K','L':'L','M':'M','N':'N','O':'O','P':'P','Q':'Q','R':'R','S':'S','T':'T','U':'U','V':'V','W':'W','X':'X','Y':'Y','Z':'Z'};
        const MAP_TECHNO = {'a':'卂','b':'乃','c':'匚','d':'刀','e':'乇','f':'千','g':'Ꮆ','h':'卄','i':'丨','j':'丁','k':'长','l':'ㄥ','m':'爪','n':'几','o':'ㄖ','p':'卩','q':'Ɋ','r':'尺','s':'丂','t':'ㄒ','u':'ㄩ','v':'ᐯ','w':'山','x':'乂','y':'丫','z':'乙','A':'卂','B':'乃','C':'匚','D':'刀','E':'乇','F':'千','G':'Ꮆ','H':'卄','I':'丨','J':'丁','K':'长','L':'ㄥ','M':'爪','N':'几','O':'ㄖ','P':'卩','Q':'Ɋ','R':'尺','S':'丂','T':'ㄒ','U':'ㄩ','V':'ᐯ','W':'山','X':'乂','Y':'丫','Z':'乙'};
        const MAP_RUNES = {'a':'ᚫ','b':'ᛒ','c':'ᚳ','d':'ᛞ','e':'ᛖ','f':'ᚠ','g':'ᚷ','h':'ᚻ','i':'ᛁ','j':'ᛃ','k':'ᚲ','l':'ᛚ','m':'ᛗ','n':'ᚾ','o':'ᚩ','p':'ᛈ','q':'ᛩ','r':'ᚱ','s':'ᛋ','t':'ᛏ','u':'ᚢ','v':'ᚡ','w':'ᚹ','x':'ᛪ','y':'ᚣ','z':'ᛉ','A':'ᚫ','B':'ᛒ','C':'ᚳ','D':'ᛞ','E':'ᛖ','F':'ᚠ','G':'ᚷ','H':'ᚻ','I':'ᛁ','J':'ᛃ','K':'ᚲ','L':'ᛚ','M':'ᛗ','N':'ᚾ','O':'ᚩ','P':'ᛈ','Q':'ᛩ','R':'ᚱ','S':'ᛋ','T':'ᛏ','U':'ᚢ','V':'ᚡ','W':'ᚹ','X':'ᛪ','Y':'ᚣ','Z':'ᛉ'};

        // Utilidades Helper
        const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const flip = (prob = 0.5) => Math.random() < prob;
        
        function applyMapFont(text, mapDict) { 
            return Array.from(text).map(c => mapDict[c] || c).join(''); 
        }
        function toLeetSpeak(text) { 
            return text.replace(/a/gi, '4').replace(/e/gi, '3').replace(/i/gi, '1').replace(/o/gi, '0').replace(/s/gi, '5').replace(/t/gi, '7'); 
        }
        function toZalgo(text) {
            const marks = ['\u030d', '\u030e', '\u0304', '\u0305', '\u033f', '\u0311', '\u0306', '\u0310', '\u0352', '\u0351', '\u0300', '\u0320', '\u0322', '\u0327', '\u0328', '\u032a', '\u032b', '\u032c', '\u032d', '\u032e', '\u032f', '\u0330', '\u0331', '\u0332', '\u0333', '\u0339', '\u033a', '\u033b', '\u033c'];
            return Array.from(text).map(c => { 
                if(c === ' ') return c; 
                let z=c; 
                for(let i=0; i<Math.floor(Math.random()*2)+1; i++) z+=rnd(marks); 
                return z; 
            }).join('');
        }

        // --- MOTORES PROCEDURALES (Combinaciones Infinitas) ---
        function genTryhard(base) { 
            const decors = [ ["꧁༒•", "•༒꧂"], ["『", "』"], ["乂", "ツ"], ["【", "】★"], ["๖ۣۜ", " ☠︎"], ["", " 亗"], ["", " 〆"], ["L-G ", ""], ["", " ︻╦デ╤━"], ["★", "★"], ["☠︎ ", " ☠︎"], ["GOD ", ""], ["TOP ", ""] ];
            const tags = ["TTV", "YT", "PRO", "GOD", "KING", "KILLER", "VIP", "1SHOT"];
            let name = flip(0.5) ? applyMapFont(base, MAP_FRAKTUR) : base.toUpperCase();
            let [l, r] = rnd(decors);
            if (flip(0.25)) name = `${name}_${rnd(tags)}`;
            else if (flip(0.2)) name = `${rnd(tags)}_${name}`;
            return `${l}${name}${r}`;
        }

        function genAesthetic(base) { 
            const EMO = ["✨", "🌸", "🦋", "💫", "☁️", "🍓", "🧸", "🤍", "🌙", "🎀", "🫧", "🪞", "🌷"];
            const KAO = ["(✿◠‿◠)", "ʕ•ᴥ•ʔ", "♥‿♥", "૮ ˶ᵔ ᵕ 1 ˶ ა", "(◡‿◡✿)", "(ɔ◔‿◔)ɔ ♥", "✧･ﾟ: *"];
            let name = flip(0.4) ? applyMapFont(base.toLowerCase(), MAP_FULLWIDTH) : base.toLowerCase();
            let e1 = rnd(EMO), e2 = rnd(EMO), k = rnd(KAO);
            const formats = [
                () => `${e1} ${name} ${e2}`,
                () => `${name} ${k}`,
                () => `-${name}${e1}🤍`,
                () => `dear.${name}`,
                () => `${name} v.v`,
                () => `soft ${name}`,
                () => `♡ ${name} ♡`,
                () => `${name} . ${e1}`,
                () => `x ${name} x`,
                () => `angel ${name}`
            ];
            return rnd(formats)();
        }

        function genPixel(base) { 
            const EMO = ["👾", "🕹️", "🎮", "🟩", "🪙", "🍄", "🔋", "🖥️"];
            const PRE = ["LVL99", "P1", "NOOB", "PRO", "1UP", "COIN", "NPC", "BIT"];
            let name = applyMapFont(base.toLowerCase(), MAP_SMALLCAPS);
            let e = rnd(EMO), p = rnd(PRE);
            const formats = [
                () => `[${name}]`,
                () => `${p}_${name}`,
                () => `${name}_${p}`,
                () => `${e} ${name} ${e}`,
                () => `retro_${name}`,
                () => `x_${name}_x`,
                () => `<${name}>`
            ];
            return rnd(formats)();
        }

        function genUrban(base) { 
            const EMO = ["✖", "💀", "🔥", "🩸", "⛓️", "💣", "🛹", "💯", "💸", "☠️"];
            const PRE = ["Lil", "Yung", "Drip", "Sick", "Real", "OG", "Trap", "TRVP"];
            let name = flip() ? applyMapFont(base.toUpperCase(), MAP_FRAKTUR) : base.toUpperCase();
            let e = rnd(EMO), p = rnd(PRE);
            const formats = [
                () => `${p}_${name}`,
                () => `${e} ${name} ${e}`,
                () => `${name}_DRIP`,
                () => `$ ${name} $`,
                () => `XX_${name}_XX`
            ];
            return rnd(formats)();
        }

        function genTechno(base) { 
            const SYM = ["▚", "▞", "◈", "░", "▒", "▓", "█", "◢", "◣", "⚡"];
            const PRE = ["UNIT", "CYBER", "SYS", "NEO", "BOT", "TECH", "VR", "AI", "SYNTH"];
            let name = flip() ? applyMapFont(base.toLowerCase(), MAP_TECHNO) : applyMapFont(base.toUpperCase(), MAP_SANS);
            let s = rnd(SYM), p = rnd(PRE);
            const formats = [
                () => `${p}-${name}`,
                () => `${p}_${name}`,
                () => `${name}.EXE`,
                () => `${name}_V2.0`,
                () => `${name}_OS`,
                () => `${s}${name}${s}`
            ];
            return rnd(formats)();
        }

        function genScript(base) { 
            const decors = [ ["~", "~"], ["✧", "✧"], ["", " ღ"], ["❥ ", ""], ["ღ ", " ღ"], ["•", "•"], ["♡ ", " ♡"], ["❧ ", " ☙"], ["✿ ", " ✿"], ["art.", ""], ["", " ✒️"], ["poem.", ""] ];
            let name = applyMapFont(base, MAP_SCRIPT);
            let [l, r] = rnd(decors);
            return `${l}${name}${r}`;
        }

        function genFantasy(base) { 
            const PRE = ["Sir", "Lord", "Knight", "King", "Darth", "Duke", "Mage", "Elf", "Hero", "Mythic"];
            const SUF = ["TheGreat", "Slayer", "Wolf", "Dragon", "Blood", "Heart"];
            let name = flip() ? applyMapFont(base.toLowerCase(), MAP_RUNES) : applyMapFont(base, MAP_FRAKTUR);
            let p = rnd(PRE), s = rnd(SUF);
            const formats = [
                () => `${p} ${name}`,
                () => `${name} ${s}`,
                () => `⚔️ ${name} 🛡️`,
                () => `🐉 ${name}`,
                () => `🏰 ${name}`,
                () => `${name} 🐺`
            ];
            return rnd(formats)();
        }

        function genGlitch(base) { 
            let name = toZalgo(base.toUpperCase());
            if (flip()) name = toZalgo(toLeetSpeak(base));
            const PRE = ["SYS.", "root@", "0x", "NULL_", "ERR_", "FATAL_", "ERROR_", "404_", "VOID_", "CRASH_"];
            const formats = [
                () => `${rnd(PRE)}${name}`,
                () => `[${name}]`,
                () => `//${name}//`,
                () => `x_${name}_x`,
                () => `${name}.bat`,
                () => `x0x_${name}`
            ];
            return rnd(formats)();
        }

        function genMinimal(base) { 
            let name = flip(0.5) ? base.toLowerCase() : applyMapFont(base.toLowerCase(), MAP_SANS);
            const formats = [
                () => `${name}.xyz`,
                () => `_${name}_`,
                () => `.${name}.`,
                () => `${name}.io`,
                () => `just ${name}`,
                () => `${name}__`,
                () => `--${name}--`,
                () => `|${name}|`,
                () => `${name}0`,
                () => `1${name}`,
                () => `${name}.js`,
                () => `${name}_x`,
                () => `i.am.${name}`,
                // LA SOLUCIÓN DEL ESPACIADO: Usar Array.from() protege el Unicode
                () => Array.from(name).join(' '),
                () => Array.from(name).join('.'),
                () => `${name}™`,
                () => `${name}©`,
                () => `${name}®`
            ];
            return rnd(formats)();
        }

        // --- Orquestador Principal Procedural ---
        function generateNicks() {
            let base = nickInput.value.trim();
            if (!base) base = "Ghost"; 
            
            const style = document.querySelector('input[name="nickStyle"]:checked').value;
            let nicks = new Set();
            
            const ALL_STYLES = ['freefire', 'tiktok', 'pixel', 'urban', 'techno', 'script', 'glitch', 'fantasy', 'minimal'];
            let attempts = 0;

            // Generamos dinámicamente llamando a las funciones procedurales
            while (nicks.size < 20 && attempts < 500) {
                let currentStyle = style === 'mixed' ? rnd(ALL_STYLES) : style;
                let nick = "";

                switch(currentStyle) {
                    case 'freefire': nick = genTryhard(base); break;
                    case 'tiktok': nick = genAesthetic(base); break;
                    case 'pixel': nick = genPixel(base); break;
                    case 'urban': nick = genUrban(base); break;
                    case 'techno': nick = genTechno(base); break;
                    case 'script': nick = genScript(base); break;
                    case 'glitch': nick = genGlitch(base); break;
                    case 'fantasy': nick = genFantasy(base); break;
                    case 'minimal': nick = genMinimal(base); break;
                }

                // Asegurar que se guarde. Si hay duplicado rarísimo, le sumamos entropía real.
                if (!nicks.has(nick)) {
                    nicks.add(nick);
                } else if (attempts > 50) {
                    nick += (Math.random() > 0.5 ? "_" : "") + Math.floor(Math.random() * 9999);
                    nicks.add(nick);
                }
                attempts++;
            }

            renderNicks(Array.from(nicks));
        }

        function renderNicks(nicksArray) {
            nickEmpty.style.opacity = '0';
            setTimeout(() => { nickEmpty.style.display = 'none'; }, 300);
            
            nickList.innerHTML = '';

            nicksArray.forEach((nick, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-gray-800/40 p-3.5 rounded-xl border border-gray-700/50 animate-pop hover:border-cyan-500/50 hover:bg-gray-800 transition-all group";
                const delay = Math.min(index * 0.03, 0.5);
                div.style.animationDelay = `${delay}s`; 
                
                div.innerHTML = `
                    <span class="text-lg text-gray-100 tracking-wide select-all truncate pr-4 unicode-text">${nick}</span>
                    <button class="copy-nick shrink-0 text-gray-400 bg-gray-900/50 hover:bg-cyan-500/20 hover:text-cyan-400 p-2.5 rounded-lg transition-all border border-gray-700 group-hover:border-cyan-500/30" data-nick="${nick}" title="Copiar Nick">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                `;
                nickList.appendChild(div);
            });

            document.querySelectorAll('.copy-nick').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const text = this.getAttribute('data-nick');
                    const icon = this.querySelector('i');
                    try {
                        await navigator.clipboard.writeText(text);
                    } catch (e) {
                        const el = document.createElement('textarea');
                        el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                    }
                    icon.className = 'fa-solid fa-check text-cyan-400';
                    this.classList.add('border-cyan-500', 'bg-cyan-500/10');
                    setTimeout(() => { 
                        icon.className = 'fa-regular fa-copy'; 
                        this.classList.remove('border-cyan-500', 'bg-cyan-500/10');
                    }, 1500);
                });
            });
        }

        btnGenNicks.addEventListener('click', generateNicks);
        nickInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') generateNicks(); });

    </script>
