<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYTELOG | Studio Multimedia Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --card-bg: #ffffff; --accent: #cc2200; --text-main: #1a1a1a; --text-muted: #666; --border: #e0e0e0; }
        body.dark { --bg: #0d0d0d; --card-bg: #161616; --text-main: #f5f5f5; --border: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); transition: 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }
        header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 24px; cursor: pointer; }
        .logo span { color: var(--accent); }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 14px; cursor: pointer; }
        .hero { text-align: center; padding: 60px 0 30px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .tool-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #workspace { display: none; padding: 50px 0; text-align: center; }
        .workspace-box { background: var(--card-bg); border-radius: 20px; padding: 40px; border: 1px solid var(--border); }
        .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 50px 20px; background: var(--bg); margin: 20px 0; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        #preview { max-width: 100%; max-height: 300px; border-radius: 10px; margin-top: 20px; display: none; }
        #status { margin-top: 15px; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
<header>
    <div class="container nav-inner">
        <div class="logo" onclick="location.reload()">BYTE<span>LOG</span></div>
        <nav>
            <ul>
                <li><a onclick="filterTools('all')">TODO</a></li>
                <li><a onclick="filterTools('video')">VIDEO</a></li>
                <li><a onclick="filterTools('image')">IMAGEN</a></li>
            </ul>
        </nav>
        <button onclick="document.body.classList.toggle('dark')" style="background:none; border:none; cursor:pointer;">🌙</button>
    </div>
</header>
<main class="container">
    <div id="home-view">
        <section class="hero">
            <h1>BYTELOG Studio</h1>
            <p>Herramientas multimedia gratuitas de alto rendimiento y procesamiento local.</p>
        </section>
        <div class="tools-grid" id="main-grid">
            <div class="tool-card" data-cat="video" onclick="startTool('v-mp3')"><div>🎵</div><h3>Video a MP3</h3><p>Extrae audio HD.</p></div>
            <div class="tool-card" data-cat="image" onclick="startTool('webp')"><div>📉</div><h3>Compresor WebP</h3><p>Optimiza tus imágenes.</p></div>
            <div class="tool-card" data-cat="image" onclick="startTool('sticker')"><div>✨</div><h3>Sticker WhatsApp</h3><p>Crea stickers HD.</p></div>
        </div>
    </div>
    <div id="workspace">
        <div class="workspace-box">
            <h2 id="tool-title">Herramienta</h2>
            <div class="drop-zone">
                <input type="file" id="fileInput" style="display:none">
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Seleccionar Archivo</button>
                <br><img id="preview">
            </div>
            <div id="status"></div>
            <a id="download-link" style="display:none" class="btn-primary">Descargar Resultado</a>
            <br><br><button onclick="location.reload()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; text-decoration:underline;">← Volver</button>
        </div>
    </div>
</main>
<script>
    let currentMode = '';
    const fileInput = document.getElementById('fileInput');
    const downloadLink = document.getElementById('download-link');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    function filterTools(cat) {
        document.querySelectorAll('.tool-card').forEach(card => {
            card.style.display = (cat === 'all' || card.dataset.cat === cat) ? 'block' : 'none';
        });
    }

    function startTool(mode) {
        currentMode = mode;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('workspace').style.display = 'block';
        document.getElementById('tool-title').innerText = mode === 'webp' ? 'Compresor WebP Pro' : (mode === 'v-mp3' ? 'Video a MP3 (Beta)' : 'Sticker WhatsApp HD');
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "Procesando...";
        
        if(currentMode === 'webp' || currentMode === 'sticker') {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    preview.src = event.target.result;
                    preview.style.display = "inline-block";
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = currentMode === 'sticker' ? 512 : img.width;
                    canvas.height = currentMode === 'sticker' ? 512 : img.height;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    downloadLink.href = canvas.toDataURL('image/webp', 0.8);
                    downloadLink.download = `bytelog_${currentMode}.webp`;
                    downloadLink.style.display = "inline-block";
                    status.innerText = "¡Listo!";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            status.innerText = "Módulo de video requiere configuración de servidor COOP/COEP.";
        }
    });
</script>
</body>
</html>
