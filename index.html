:root{--bg:#f8f7f4;--bg2:#fff;--bg3:#f0ede8;--text:#1a1814;--text2:#4a4640;--muted:#8a8480;--border:#e0dbd4;--red:#cc2200;--dark:#1a1814}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg3)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}

.ticker-wrap{background:#1a1814;height:36px;display:flex;overflow:hidden}

#searchInput:focus{border-color:var(--red)}
.search-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;line-height:1}
nav{border-top:2px solid #1a1814;border-bottom:1px solid var(--border)}

.nav-btn{background:none;border:none;cursor:pointer;padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;color:#4a4640;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;font-family:inherit}
.nav-btn:hover,.nav-btn.active{color:var(--red);border-bottom-color:var(--red)}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:4px}
main{padding:28px 0 60px}

.section-label{display:flex;align-items:center;gap:10px;margin-bottom:16px}

.featured-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:28px}
.card{background:#fff;border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}

.card-img-wrap{position:relative;padding-top:58%;overflow:hidden}

.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 60%)}
.card-body{padding:18px}
.card-title{font-size:clamp(16px,2.2vw,22px);font-weight:700;color:#1a1814;line-height:1.3;margin:8px 0 10px}
.card-excerpt{font-size:14px;color:#6a6460;line-height:1.7;margin-bottom:14px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-meta{font-size:11px;color:#8a8480}
.card-sm{display:flex;gap:12px;background:#fff;border-radius:6px;border:1px solid var(--border);overflow:hidden;padding:12px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.card-sm:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.card-sm-img{width:100px;height:74px;border-radius:4px;overflow:hidden;flex-shrink:0}
.card-sm-img img{width:100%;height:100%}
.card-sm-body{flex:1;min-width:0}
.card-sm-title{font-size:14px;font-weight:700;color:#1a1814;line-height:1.3;margin:6px 0 6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.badge{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:2px;margin-bottom:6px}
.btn-red{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;padding:8px 18px;border-radius:4px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .2s;font-family:inherit;text-decoration:none}
.btn-red:hover{background:#aa1800}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--text);padding:8px 16px;border-radius:4px;font-size:12px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;font-family:inherit}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}
.ad-slot{background:linear-gradient(135deg,#f0ede8,#e8e4de);border:2px dashed #d0ccc4;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#bbb;font-size:11px;letter-spacing:1px}
.sidebar-box{background:#fff;border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.sidebar-title{padding:12px 16px;border-bottom:2px solid #1a1814;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.sidebar-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #f0ede8;cursor:pointer;align-items:flex-start;transition:background .2s}
.sidebar-item:hover{background:#f8f7f4}
.sidebar-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#e0dbd4;line-height:1;flex-shrink:0;width:26px}
.article-hero{position:relative;height:clamp(280px,45vw,480px);overflow:hidden}
.article-hero img{width:100%;height:100%;object-fit:cover}
.article-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.15) 100%)}
.article-hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px 20px}
.article-title{color:#fff;font-size:clamp(22px,4vw,44px);font-weight:700;line-height:1.2;max-width:800px}
.article-grid{display:grid;grid-template-columns:1fr 300px;gap:40px;align-items:start;padding:32px 0}
.article-content-box{background:#fff;border-radius:8px;padding:32px;border:1px solid var(--border);line-height:1.9;font-size:16px;color:#3a3632}
.article-content-box h2{font-size:22px;font-weight:700;margin:28px 0 12px;color:#1a1814;font-family:'Source Serif 4',serif}
.article-content-box p{margin-bottom:16px}
.article-meta-box{background:#fff;border-radius:6px;padding:16px;border:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;gap:14px}
.author-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0}
.share-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:4px;font-size:12px;font-weight:600;border:none;cursor:pointer;color:#fff;transition:opacity .2s}
.share-btn:hover{opacity:.85}
.tags-wrap{margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tag{background:#f0ede8;color:#4a4640;padding:4px 10px;border-radius:3px;font-size:12px;border:1px solid var(--border)}
footer{background:#1a1814;color:#aaa;margin-top:0}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;padding:40px 0 28px}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:#fff;margin-bottom:10px}
.footer-link{font-size:13px;margin-bottom:9px;cursor:pointer;transition:color .2s;display:block}
.footer-link:hover{color:var(--red)}
.footer-bottom{border-top:1px solid #333;padding:18px 0;display:flex;justify-content:space-between;font-size:12px;flex-wrap:wrap;gap:8px}
.cookie-banner{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#1a1814;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.cookie-text{font-size:13px;display:flex;align-items:center;gap:10px}
.static-content{background:#fff;border-radius:8px;padding:40px;border:1px solid var(--border);max-width:800px;line-height:1.9}
.static-content h2{font-size:20px;font-weight:700;margin:24px 0 10px;color:#1a1814;font-family:'Source Serif 4',serif}
.static-content p{margin-bottom:14px;color:#4a4640}
.mobile-menu{display:none;flex-direction:column;background:#fff;border-top:1px solid var(--border);position:absolute;left:0;right:0;box-shadow:0 8px 20px rgba(0,0,0,.1);z-index:99}
.mobile-menu.open{display:flex}
.mobile-nav-btn{background:none;border:none;cursor:pointer;padding:13px 20px;font-size:13px;font-weight:700;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border);font-family:inherit;color:#4a4640}
.mobile-nav-btn:hover,.mobile-nav-btn.active{color:var(--red);background:#faf8f5}

/* ===== MODO OSCURO ===== */
body.dark{--bg:#0f0e0d;--bg2:#1a1814;--bg3:#252220;--text:#e8e4dc;--text2:#b0aca6;--muted:#706c68;--border:#333;--dark:#e8e4dc}
body.dark header{background:#1a1814}
body.dark .card{background:#1a1814}
body.dark .card-title{color:#e8e4dc!important}
body.dark .card-sm-title{color:#e8e4dc!important}
body.dark .section-title{color:#e8e4dc}
body.dark .sidebar-num{color:#444}
body.dark .sidebar-item .card-title{color:#e8e4dc!important}
body.dark div[style*="color:#1a1814"]{color:#e8e4dc!important}
body.dark div[style*="font-weight:600"]{color:#e8e4dc!important}
body.dark .sidebar-box{background:#1a1814}
body.dark .article-content-box{background:#1a1814;color:#c8c4bc}
body.dark .article-meta-box{background:#1a1814}
body.dark .static-content{background:#1a1814}
body.dark .mobile-menu{background:#1a1814}
body.dark .card-sm{background:#1a1814}
body.dark .logo-text{color:#e8e4dc}
body.dark nav{border-top-color:#333}
body.dark .nav-btn{color:#b0aca6}
body.dark #searchInput{background:#252220;color:#e8e4dc;border-color:#333}
body.dark .tag{background:#252220;color:#b0aca6;border-color:#333}
body.dark .sidebar-item:hover{background:#252220}
body.dark .mobile-nav-btn{color:#b0aca6;border-bottom-color:#333}
body.dark .mobile-nav-btn:hover{background:#252220}
body.dark .read-time-bar{background:#252220;color:#b0aca6}
body.dark .card-excerpt{color:#a0a09a}
body.dark .card-meta{color:#706c68}
body.dark .footer-bottom{color:#555}
/* Fix textos inline en modo oscuro */
body.dark #app *{color:inherit}
body.dark #app .card-title,
body.dark #app .card-sm-title,
body.dark #app [style*="color:#1a1814"],
body.dark #app [style*="color: #1a1814"]{color:#e8e4dc!important}
body.dark #app [style*="color:#4a4640"],
body.dark #app [style*="color:#6a6460"],
body.dark #app [style*="color:#3a3632"]{color:#b0aca6!important}
body.dark #app [style*="color:#8a8480"]{color:#706c68!important}
.dark-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:transform .2s}
.dark-btn:hover{transform:scale(1.2)}
/* ===== BARRA DE PROGRESO ===== */
#read-progress{position:fixed;top:0;left:0;height:3px;background:var(--red);width:0%;z-index:999;transition:width .1s}
/* ===== ANIMACIONES AL CARGAR ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card,.card-sm{animation:fadeUp .35s ease both}
.card:nth-child(1),.card-sm:nth-child(1){animation-delay:.05s}
.card:nth-child(2),.card-sm:nth-child(2){animation-delay:.1s}
.card:nth-child(3),.card-sm:nth-child(3){animation-delay:.15s}
.card:nth-child(4),.card-sm:nth-child(4){animation-delay:.2s}
.card:nth-child(5),.card-sm:nth-child(5){animation-delay:.25s}
/* ===== MEJOR ARTICULO ===== */
.article-content-box{line-height:2;font-size:17px}
.article-content-box h2{font-size:24px;border-left:4px solid var(--red);padding-left:14px;margin:32px 0 14px}
.article-content-box p{margin-bottom:20px;color:#4a4640}
body.dark .article-content-box p{color:#b0aca6}
.article-hero{height:clamp(300px,50vw,520px)}
.read-time-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:6px;padding:10px 16px;margin-bottom:20px;font-size:13px;color:var(--muted)}
.ad-mobile-only{display:none}
.ad-desktop-only{display:block}
@media(max-width:640px){
  .ad-mobile-only{display:block}
  .ad-desktop-only{display:none}
}
/* ===== FIX GLOBAL ADS ===== */
iframe{max-width:100%!important}
div[id^="ad-"],div[id^="adslot"]{max-width:100%!important;overflow:hidden!important;width:100%!important}
#adslot-728{max-width:100%!important;overflow:hidden!important}

@media(max-width:640px){
  .ad-banner{display:none!important;width:0!important;max-width:0!important;flex:0!important;overflow:hidden!important;padding:0!important;margin:0!important}
  .logo-bar{padding:8px 0;gap:8px}
  .logo-text{font-size:26px;letter-spacing:2px}
  .hamburger{display:block}
  .nav-inner{display:none}
  .topbar-date{display:none}
  .footer-grid{grid-template-columns:1fr}
  .article-content-box{padding:16px}
  .static-content{padding:20px}
  .search-area{gap:4px}
  #searchInput{width:130px;font-size:12px;padding:6px 10px}
  .card-title{font-size:17px}
  .card-excerpt{font-size:13px}
  .card-body{padding:14px}
  .card-sm{padding:10px;gap:10px}
  .card-sm-img{width:82px;height:62px}
  .card-sm-title{font-size:13px}
  main{padding:14px 0 40px}
  .container{padding:0 12px}
  .featured-grid{gap:10px}
  .section-label{margin-bottom:12px}
  .cookie-banner{padding:10px 14px;gap:10px}
  .cookie-text{font-size:12px}
}
@media(min-width:641px){.hamburger{display:none}.mobile-menu{display:none!important}}
</style>

function goHome(){activeCategory='PORTADA';currentArticle=null;currentPage=null;searchQuery='';buildNav();render();window.scrollTo({top:0,behavior:'smooth'});}
function acceptCookies(){document.getElementById('cookieBanner').style.display='none';}
function updateCookieBanner(){const t=I18N[lang];document.getElementById('cookieMsg').innerHTML=t.cookieMsg+' <a href="#" onclick="showPage(\'cookies\');return false" style="color:var(--red);text-decoration:underline">'+t.cookies+'</a>';document.getElementById('cookieAcceptBtn').textContent=t.cookieAccept;document.getElementById('cookieRejectBtn').textContent=t.cookieReject;}
function badgeStyle(article,bg=true){if(bg)return'background:'+article.accent+'20;color:'+article.accent;return'background:'+article.accent+';color:#fff';}
function openArticle(id){
  currentArticle=ARTICLES.find(a=>a.id===id);
  currentPage=null;
  const title=lang==='es'?currentArticle.title:currentArticle.titleEn||currentArticle.title;
  const excerpt=lang==='es'?currentArticle.excerpt:currentArticle.excerptEn||currentArticle.excerpt;
  document.title=title+' | BYTELOG';
  document.querySelector('meta[name="description"]').setAttribute('content',excerpt);
  document.querySelector('meta[property="og:title"]').setAttribute('content',title);
  document.querySelector('meta[property="og:description"]').setAttribute('content',excerpt);
  document.querySelector('meta[property="og:image"]').setAttribute('content',currentArticle.image);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content',title);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content',excerpt);
  document.querySelector('meta[name="twitter:image"]').setAttribute('content',currentArticle.image);
  let schema=document.getElementById('article-schema');
  if(!schema){schema=document.createElement('script');schema.type='application/ld+json';schema.id='article-schema';document.head.appendChild(schema);}
  schema.textContent=JSON.stringify({"@context":"https://schema.org","@type":"NewsArticle","headline":title,"description":excerpt,"image":currentArticle.image,"datePublished":currentArticle.date,"author":{"@type":"Organization","name":"ByteLog"},"publisher":{"@type":"Organization","name":"ByteLog","logo":{"@type":"ImageObject","url":"https://res.cloudinary.com/dwjy3y6va/image/upload/v1772839650/logo_tech_tp7fxp.jpg"}}});
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function showPage(page){currentPage=page;currentArticle=null;render();window.scrollTo({top:0,behavior:'smooth'});}
function goBack(){
  currentArticle=null;currentPage=null;
  document.title='BYTELOG | Tecnologia al dia';
  document.querySelector('meta[name="description"]').setAttribute('content','BYTELOG - Tu fuente de noticias tecnologicas para Latinoamerica. Gaming, IA, hardware, software y apps.');
  render();window.scrollTo({top:0,behavior:'smooth'});
}
// ===== FIX COMPARTIR =====
// Usa currentArticle en vez de pasar el titulo como string en onclick
// Esto evita que tildes, comillas y caracteres especiales rompan los botones
function shareCurrentArticle(platform){
  if(!currentArticle) return;
  const title=lang==='es'?currentArticle.title:currentArticle.titleEn||currentArticle.title;
  const pageUrl=window.location.href;
  const enc=encodeURIComponent;
  const links={
    'Twitter/X':'https://twitter.com/intent/tweet?text='+enc(title)+'&url='+enc(pageUrl),
    'Facebook':'https://www.facebook.com/sharer/sharer.php?u='+enc(pageUrl),
    'WhatsApp':'https://wa.me/?text='+enc(title+' - '+pageUrl)
  };
  if(!links[platform]) return;
  if(navigator.share && /Android|iPhone|iPad/i.test(navigator.userAgent)){
    navigator.share({title:title,url:pageUrl}).catch(function(){});
    return;
  }
  var a=document.createElement('a');
  a.href=links[platform];
  a.target='_blank';
  a.rel='noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

    '<div><div style="color:#fff;font-weight:700;font-size:12px;letter-spacing:2px;margin-bottom:16px;text-transform:uppercase">'+t.sections+'</div>'+['GAMING','HARDWARE','SOFTWARE','INTELIGENCIA ARTIFICIAL','APPS'].map(cat=>'<a class="footer-link" onclick="setCategory(\''+cat+'\')">'+cat+'</a>').join('')+'</div>'+
    '<div><div style="color:#fff;font-weight:700;font-size:12px;letter-spacing:2px;margin-bottom:16px;text-transform:uppercase">Legal</div><a class="footer-link" onclick="showPage(\'about\')">'+t.about+'</a><a class="footer-link" onclick="showPage(\'privacy\')">'+t.privacy+'</a><a class="footer-link" onclick="showPage(\'cookies\')">'+t.cookies+'</a><a class="footer-link" onclick="showPage(\'legal\')">'+t.legal+'</a></div>';

}
buildFooter();
function render(){
  const app=document.getElementById('app');const t=I18N[lang];
  if(currentArticle){app.innerHTML=renderArticlePage(currentArticle,t);setTimeout(placeAds,50);return;}
  if(currentPage){app.innerHTML=renderStaticPage(currentPage,t);return;}
  let filtered=ARTICLES;
  if(activeCategory!=='PORTADA')filtered=ARTICLES.filter(a=>a.category===activeCategory);
  if(searchQuery)filtered=ARTICLES.filter(a=>(lang==='es'?a.title:a.titleEn||a.title).toLowerCase().includes(searchQuery.toLowerCase())||(lang==='es'?a.excerpt:a.excerptEn||a.excerpt).toLowerCase().includes(searchQuery.toLowerCase())||a.category.toLowerCase().includes(searchQuery.toLowerCase()));
  const featured=(activeCategory==='PORTADA'&&!searchQuery)?filtered.filter(a=>a.featured).slice(0,2):[];
  const rest=(activeCategory==='PORTADA'&&!searchQuery)?filtered.filter(a=>!a.featured):filtered;
  app.innerHTML=
    '<main><div class="container">'+
    (searchQuery?'<div style="margin-bottom:20px;padding:12px 16px;background:#fff;border-radius:6px;border:1px solid var(--border);font-size:13px;color:#4a4640">'+filtered.length+' '+t.searchResults+' "<strong>'+searchQuery+'</strong>"</div>':'')+
    '<div class="main-grid"><div>'+
    (featured.length?'<div class="section-label"><div class="section-bar"></div><div class="section-title">'+t.featured+'</div></div><div class="featured-grid">'+featured.map(a=>renderFeaturedCard(a,t)).join('')+'</div>':'')+
    '<div id="adslot-728" style="margin-bottom:28px;text-align:center;overflow:hidden;max-width:100%"></div>'+
    '<div class="section-label"><div class="section-bar"></div><div class="section-title">'+(activeCategory==='PORTADA'?t.latestNews:activeCategory)+'</div></div>'+
    (rest.length===0?'<div style="text-align:center;padding:60px;color:#8a8480">No se encontraron articulos.</div>':'')+
    '<div style="display:flex;flex-direction:column;gap:12px">'+rest.map(a=>renderSmallCard(a,t)).join('')+'</div>'+
    '</div>'+
    '<div class="sidebar-desktop">'+
    '<div id="adslot-300-top" style="margin-bottom:20px;text-align:center"></div>'+
    '<div class="sidebar-box"><div class="sidebar-title">'+t.mostRead+'</div>'+
    ARTICLES.slice(0,5).map((a,i)=>'<div class="sidebar-item" onclick="openArticle('+a.id+')"><span class="sidebar-num">'+(i+1)+'</span><div><span class="badge" style="'+badgeStyle(a)+'">'+a.category+'</span><div style="font-size:13px;font-weight:600;line-height:1.3;color:#1a1814">'+(lang==='es'?a.title:a.titleEn||a.title)+'</div></div></div>').join('')+
    '</div>'+
    '<div id="adslot-160-bot" style="margin-top:20px;text-align:center"></div>'+
    '</div></div></div></main>';
  setTimeout(placeAds,50);
}
function renderFeaturedCard(a,t){
  const title=lang==='es'?a.title:a.titleEn||a.title;
  const excerpt=lang==='es'?a.excerpt:a.excerptEn||a.excerpt;
  const date=lang==='es'?a.date:a.dateEn||a.date;
  return'<div class="card" onclick="openArticle('+a.id+')"><div class="card-img-wrap"><img src="'+a.image+'" alt="" loading="lazy"/><div class="card-overlay"></div><span class="badge" style="'+badgeStyle(a,false)+';position:absolute;top:12px;left:12px">'+a.category+'</span></div><div class="card-body"><h2 class="card-title">'+title+'</h2><p class="card-excerpt">'+excerpt+'</p><div class="card-footer"><span class="card-meta">'+date+' &middot; '+a.readTime+' '+t.minRead+'</span><button class="btn-red" style="font-size:11px;padding:6px 14px">'+t.readMore+' &rarr;</button></div></div></div>';
}
function renderSmallCard(a,t){
  const title=lang==='es'?a.title:a.titleEn||a.title;
  const date=lang==='es'?a.date:a.dateEn||a.date;
  return'<div class="card-sm" onclick="openArticle('+a.id+')"><div class="card-sm-img"><img src="'+a.image+'" alt="" loading="lazy"/></div><div class="card-sm-body"><span class="badge" style="'+badgeStyle(a)+'">'+a.category+'</span><div class="card-sm-title">'+title+'</div><div style="font-size:11px;color:#8a8480">'+date+' &middot; '+a.readTime+' '+t.minRead+'</div></div></div>';
}
function renderArticlePage(a,t){
  const title=lang==='es'?a.title:a.titleEn||a.title;
  const date=lang==='es'?a.date:a.dateEn||a.date;
  const related=ARTICLES.filter(x=>x.id!==a.id&&x.category===a.category).slice(0,3);
  return'<div><div class="article-hero"><img src="'+a.image+'" alt=""/><div class="article-hero-overlay"></div><div class="article-hero-content"><div class="container"><span class="badge" style="'+badgeStyle(a,false)+';margin-bottom:12px;display:inline-block">'+a.category+'</span><h1 class="article-title">'+title+'</h1></div></div></div>'+
  '<div class="container"><div class="article-grid"><div>'+
  '<div class="article-meta-box"><div class="author-avatar" style="background:'+a.accent+'">B</div><div><div style="font-weight:600;font-size:14px">'+a.author+'</div><div style="font-size:12px;color:#8a8480">'+t.publishedOn+' '+date+'</div></div></div>'+
  '<div class="read-time-bar">📖 '+a.readTime+' '+t.minRead+' &nbsp;|&nbsp; 🏷️ '+a.category+'</div>'+
  '<div class="share-bar"><span style="font-size:12px;color:#8a8480;font-weight:600">'+t.shareOn+':</span>'+
  '<button class="share-btn" style="background:#000" onclick="shareCurrentArticle(\'Twitter/X\')">X Twitter</button>'+
  '<button class="share-btn" style="background:#1877f2" onclick="shareCurrentArticle(\'Facebook\')">Facebook</button>'+
  '<button class="share-btn" style="background:#25d366" onclick="shareCurrentArticle(\'WhatsApp\')">WhatsApp</button></div>'+
  '<div class="article-content-box">'+a.content+'</div>'+
  '<div class="tags-wrap"><span style="font-size:12px;color:#8a8480;font-weight:600">'+t.tags+':</span>'+a.tags.map(tag=>'<span class="tag">#'+tag+'</span>').join('')+'</div>'+
  '<button class="btn-red" onclick="goBack()" style="margin-top:28px">'+t.back+'</button>'+
  '</div>'+
  '<div class="sidebar-desktop">'+
  '<div id="adslot-300-top" style="margin-bottom:20px;text-align:center"></div>'+
  (related.length?'<div class="sidebar-box"><div class="sidebar-title">'+t.moreArticles+'</div>'+related.map(r=>'<div class="sidebar-item" onclick="openArticle('+r.id+')"><div><span class="badge" style="'+badgeStyle(r)+'">'+r.category+'</span><div style="font-size:13px;font-weight:600;line-height:1.3;color:#1a1814">'+(lang==='es'?r.title:r.titleEn||r.title)+'</div></div></div>').join('')+'</div>':'')+
  '<div id="adslot-160-bot" style="margin-top:20px;text-align:center"></div>'+
  '</div></div></div></div>';
}
